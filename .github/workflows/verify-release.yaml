name: 🔒 verify-release

# Post-release smoke test: installs the just-published package globally from
# the real npm registry (not local source) and runs it in a clean directory,
# proving the published artifact actually works standalone on every platform
# it claims to support.
#
# Runs automatically after every successful release run.
on:
  workflow_run:
    workflows: ["🚀 release"]
    types: [completed]

permissions: {}

jobs:
  verify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-26.04, ubuntu-26.04-arm, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    defaults:
      run:
        # Windows runners default `run:` steps to PowerShell, which doesn't
        # understand $(...) / $GITHUB_OUTPUT. GitHub-hosted Windows runners
        # ship Git Bash, so this keeps every step's syntax uniform across the
        # whole matrix.
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve version
        id: ver
        run: echo "version=$(node -p "require('./packages/cli/package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install the published package globally
        run: npm install -g profil@${{ steps.ver.outputs.version }}

      - name: Smoke test in a clean directory
        run: |
          set -euo pipefail
          profil --version
          work="$(mktemp -d)"
          cd "$work"
          profil init
          profil check
