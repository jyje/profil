name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # check = package build (tsc) + workspace tests (vitest) + profil check (static checks)
      - run: npm run check
      # post-M2: upload dist/**/*.pdf, dist/**/*.docx as release artifacts
