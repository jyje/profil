name: 🚀 release

# Release model: packages/cli/package.json's version is the source of truth.
# When a commit on main changes it to a clean X.Y.Z version with no tag yet
# (normally the merge of a propose-release PR), CI tags it, writes release
# notes from CHANGELOG.md, and publishes to npm. CI never pushes to main —
# the tag, release, and npm publish are the only outputs.
#
# The path trigger fires on ANY change to package.json (dependency bumps
# included), so the skip guard below decides whether there is actually a
# release to cut: prerelease versions (-dev.N — the repo's normal working
# state) and already-tagged versions are no-ops.
on:
  push:
    branches: [main]
    paths: ["packages/cli/package.json"]

permissions:
  contents: write # create the tag + GitHub Release
  id-token: write # mint a GitHub Actions OIDC token for npm provenance

jobs:
  release:
    runs-on: ubuntu-26.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags for the tag-exists guard

      - name: Resolve version and decide whether to release
        id: ver
        run: |
          VER="$(node -p "require('./packages/cli/package.json').version")"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          if [[ "$VER" == *-* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v$VER is a prerelease (dev) version — only clean X.Y.Z versions are released."
          elif git rev-parse -q --verify "refs/tags/v$VER" >/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v$VER already released — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section for this version
        if: steps.ver.outputs.skip == 'false'
        run: |
          # CHANGELOG.md is generated by propose-release; guard anyway so a
          # release cut outside that flow still works, just with empty notes.
          if [ -f CHANGELOG.md ]; then
            awk -v marker="[${{ steps.ver.outputs.version }}]" '
              /^## \[/ {
                if (found) exit
                if (index($0, marker) > 0) { found=1; next }
                next
              }
              found { print }
            ' CHANGELOG.md > /tmp/release-notes.md
          else
            echo "::warning::CHANGELOG.md not found — releasing with empty notes"
            : > /tmp/release-notes.md
          fi

      - uses: actions/setup-node@v6
        if: steps.ver.outputs.skip == 'false'
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
        if: steps.ver.outputs.skip == 'false'
      # check = package build (tsc) + workspace tests (vitest) + profil check
      - run: npm run check
        if: steps.ver.outputs.skip == 'false'

      - name: Create tag + GitHub Release
        if: steps.ver.outputs.skip == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: profil v${{ steps.ver.outputs.version }}
          body_path: /tmp/release-notes.md

      # prepublishOnly bundles the package with esbuild automatically.
      # --provenance attests (via GitHub Actions OIDC) that this publish came
      # from this workflow run — shown as a Provenance badge on the npm page.
      - run: npm publish --access public --provenance
        if: steps.ver.outputs.skip == 'false'
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
