# design/tokens.yaml
# Single source of design truth. CSS variables, print CSS, and reference.docx
# styles are all generated from here.
# Don't hand-edit CSS or .docx directly — change this file and run
# `npm run build:design`.

color:
  background: "#ffffff"
  text: "#1a1a1a"
  text_muted: "#5c5c5c"
  accent: "#2f6f4f"       # sample color — swap for your own brand color
  border: "#e0e0e0"

typography:
  font_body: "'Noto Sans KR', 'Pretendard', Helvetica, Arial, sans-serif"
  font_heading: "'Noto Serif KR', 'Pretendard', Helvetica, Arial, sans-serif"
  scale:
    xs: 0.75rem
    sm: 0.875rem
    base: 1rem
    lg: 1.125rem
    xl: 1.5rem
    "2xl": 2rem
  line_height:
    body: 1.6
    heading: 1.3

spacing:
  unit: 8px      # 4/8 grid
  page_margin_print: 8mm

layout:
  max_width_content: 720px
  sidebar_width: 280px

print:
  page_size: A4
  margin:
    top: 8mm
    right: 8mm
    bottom: 8mm
    left: 8mm

docx:
  # Style names mapped when generating the Pandoc reference.docx
  heading1_style: "Title"
  heading2_style: "Heading 1"
  body_style: "Normal"
  font_family: "Noto Sans KR"
