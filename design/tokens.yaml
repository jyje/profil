# design/tokens.yaml
# 단일 디자인 진실. 여기서 CSS 변수, print CSS, reference.docx 스타일이 생성됩니다.
# 직접 CSS나 .docx를 수정하지 마세요 — 이 파일을 바꾸고 `npm run build:design`을 실행하세요.

color:
  background: "#ffffff"
  text: "#1a1a1a"
  text_muted: "#5c5c5c"
  accent: "#2f6f4f"       # 예시: 마당의 이끼색. 원하는 브랜드 색으로 교체
  border: "#e0e0e0"

typography:
  font_body: "'Noto Sans KR', 'Pretendard', Helvetica, Arial, sans-serif"
  font_heading: "'Noto Serif KR', 'Pretendard', Helvetica, Arial, sans-serif"
  scale:
    xs: 0.75rem
    sm: 0.875rem
    base: 1rem
    lg: 1.125rem
    xl: 1.5rem
    "2xl": 2rem
  line_height:
    body: 1.6
    heading: 1.3

spacing:
  unit: 8px      # 4/8 그리드
  page_margin_print: 8mm

layout:
  max_width_content: 720px
  sidebar_width: 280px

print:
  page_size: A4
  margin:
    top: 8mm
    right: 8mm
    bottom: 8mm
    left: 8mm

docx:
  # Pandoc reference.docx 생성 시 매핑되는 스타일 이름
  heading1_style: "Title"
  heading2_style: "Heading 1"
  body_style: "Normal"
  font_family: "Noto Sans KR"
