# cliff.toml — git-cliff configuration
#
# Maps the gitmoji+type vocabulary from .claude/skills/git-commit-helper into
# changelog sections. Commit descriptions are prose (English, per this repo's
# policy); only the type prefix before the colon drives the grouping below.

[changelog]
header = """
# Changelog\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | trim }} ({{ commit.id | truncate(length=7, end="") }})
    {% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"

commit_parsers = [
  { message = "^✨ feat", group = "✨ Features" },
  { message = "^🛠️ fix", group = "🐛 Fixes" },
  { message = "^🐛 bug", group = "🐛 Fixes" },
  { message = "^🔐 security", group = "🔐 Security" },
  { message = "^⚡ perf", group = "⚡ Performance" },
  { message = "^♻️ refactor", group = "♻️ Refactoring" },
  { message = "^📄 docs", group = "📄 Documentation" },
  { message = "^📝 article", group = "📄 Documentation" },
  { message = "^🔨 build", group = "🔨 Build & CI" },
  { message = "^🤖 ci", group = "🔨 Build & CI" },
  { message = "^⬆️ dep", group = "⬆️ Dependencies" },
  { message = "^🗑️ remove", group = "🗑️ Removed" },
  { message = "^🚀 release", group = "🔧 Maintenance" },
  { message = "^🎉 init", group = "🔧 Maintenance" },
  { message = ".*", group = "🔧 Maintenance" },
]
